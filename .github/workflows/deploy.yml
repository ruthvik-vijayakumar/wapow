name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_NAMESPACE: tunedin

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push wapow-app
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_NAMESPACE/wapow-app:latest" -t "$ECR_REGISTRY/$ECR_NAMESPACE/wapow-app:$IMAGE_TAG" -f wapow-app/Dockerfile wapow-app
          docker push "$ECR_REGISTRY/$ECR_NAMESPACE/wapow-app:latest"
          docker push "$ECR_REGISTRY/$ECR_NAMESPACE/wapow-app:$IMAGE_TAG"

      - name: Build and push wapow-collector
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_NAMESPACE/wapow-collector:latest" -t "$ECR_REGISTRY/$ECR_NAMESPACE/wapow-collector:$IMAGE_TAG" -f wapow-collector/Dockerfile wapow-collector
          docker push "$ECR_REGISTRY/$ECR_NAMESPACE/wapow-collector:latest"
          docker push "$ECR_REGISTRY/$ECR_NAMESPACE/wapow-collector:$IMAGE_TAG"

      - name: Build and push wapow-worker
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_NAMESPACE/wapow-worker:latest" -t "$ECR_REGISTRY/$ECR_NAMESPACE/wapow-worker:$IMAGE_TAG" -f wapow-worker/Dockerfile wapow-worker
          docker push "$ECR_REGISTRY/$ECR_NAMESPACE/wapow-worker:latest"
          docker push "$ECR_REGISTRY/$ECR_NAMESPACE/wapow-worker:$IMAGE_TAG"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_NAMESPACE: ${{ env.ECR_NAMESPACE }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: AWS_REGION,ECR_REGISTRY,ECR_NAMESPACE,DEPLOY_PATH
          script: |
            set -euo pipefail
            aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
            docker pull "$ECR_REGISTRY/$ECR_NAMESPACE/wapow-app:latest"
            docker pull "$ECR_REGISTRY/$ECR_NAMESPACE/wapow-collector:latest"
            docker pull "$ECR_REGISTRY/$ECR_NAMESPACE/wapow-worker:latest"
            cd "${DEPLOY_PATH:-/opt/wapow}"
            if [ -d .git ]; then git pull --ff-only; fi
            export REGISTRY_PREFIX="$ECR_REGISTRY/$ECR_NAMESPACE"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
