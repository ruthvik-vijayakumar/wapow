name: Deploy

on:
  push:
    branches: [main]

# Registry slug only — set GitHub secret DO_REGISTRY_NAME (e.g. wapow-do-registry)
env:
  REGISTRY_PREFIX: registry.digitalocean.com/wapow-do-registry

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to DO Container Registry
        run: echo "${{ secrets.DO_API_TOKEN }}" | docker login registry.digitalocean.com -u "${{ secrets.DO_API_TOKEN }}" --password-stdin

      - name: Build and push wapow-app
        run: |
          docker build -t "${REGISTRY_PREFIX}/wapow-app:latest" -f wapow-app/Dockerfile wapow-app
          docker push "${REGISTRY_PREFIX}/wapow-app:latest"

      - name: Build and push wapow-collector
        run: |
          docker build -t "${REGISTRY_PREFIX}/wapow-collector:latest" -f wapow-collector/Dockerfile wapow-collector
          docker push "${REGISTRY_PREFIX}/wapow-collector:latest"

      # Remote shell does NOT inherit GitHub env — pass tokens and registry via envs
      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1
        env:
          DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
          REGISTRY_PREFIX: ${{ env.REGISTRY_PREFIX }}
          # Optional: set secret DEPLOY_PATH to the clone dir on the Droplet (default /opt/wapow)
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DO_API_TOKEN,REGISTRY_PREFIX,DEPLOY_PATH
          script: |
            set -euo pipefail
            echo "$DO_API_TOKEN" | docker login registry.digitalocean.com -u "$DO_API_TOKEN" --password-stdin
            docker pull "${REGISTRY_PREFIX}/wapow-app:latest"
            docker pull "${REGISTRY_PREFIX}/wapow-collector:latest"
            cd "/app"
            export REGISTRY_PREFIX="$REGISTRY_PREFIX"
            docker compose -f docker-compose.prod.yml pull app collector
            docker compose -f docker-compose.prod.yml up -d
