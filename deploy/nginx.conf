user  www-data;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80 default_server;
        server_name _;

        # Root points to built Vue app
        root /var/www/wapow-ui;
        index index.html;

        # Serve static assets directly
        location /assets/ {
            try_files $uri =404;
        }

        # API proxy -> FastAPI container
        location /api/ {
            proxy_pass         http://wapow-api:3001;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Analytics collector proxy
        location /collect/ {
            proxy_pass         http://wapow-collector:3002;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # SPA fallback for Vue Router history mode
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}

