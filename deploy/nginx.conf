user  www-data;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Docker embedded DNS — defer resolving Compose service names until request time
    # so Nginx can start before app/collector are up (avoids "host not found in upstream").
    resolver 127.0.0.11 ipv6=off valid=10s;

    # --- Main site: Vue SPA (apex + www) ---
    server {
        listen 80 default_server;
        server_name tunedin.live www.tunedin.live;

        root /var/www/wapow-ui;
        index index.html;

        location /assets/ {
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # --- API: FastAPI (wapow-app) — service name: app ---
    server {
        listen 80;
        server_name api.tunedin.live;

        location / {
            set $api_upstream http://app:3001;
            proxy_pass         $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # --- Analytics collector — service name: collector ---
    server {
        listen 80;
        server_name collector.tunedin.live;

        location / {
            set $collector_upstream http://collector:3002;
            proxy_pass         $collector_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
