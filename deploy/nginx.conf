# Use after: certbot certonly --webroot -w /var/www/certbot -d api.tunedin.live -d collector.tunedin.live
# Mount /etc/letsencrypt read-only in the nginx container and publish 443.
# Cert paths assume the certificate line directory is api.tunedin.live (first -d).

user  www-data;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    resolver 127.0.0.11 ipv6=off valid=10s;

    server {
        listen 80 default_server;
        server_name _;
        default_type text/plain;
        return 200 'wapow gateway — use api.* and collector.* hostnames\n';
    }

    # --- API: HTTP → ACME + redirect to HTTPS ---
    server {
        listen 80;
        server_name api.tunedin.live;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name api.tunedin.live;

        ssl_certificate     /etc/letsencrypt/live/api.tunedin.live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.tunedin.live/privkey.pem;

        location / {
            set $api_upstream http://app:3001;
            proxy_pass         $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # --- Collector: HTTP → ACME + redirect to HTTPS ---
    server {
        listen 80;
        server_name collector.tunedin.live;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name collector.tunedin.live;

        ssl_certificate     /etc/letsencrypt/live/api.tunedin.live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.tunedin.live/privkey.pem;

        location / {
            set $collector_upstream http://collector:3002;
            proxy_pass         $collector_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
