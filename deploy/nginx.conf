user  www-data;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Upstreams: use Compose service names (not container_name)
    upstream wapow_api {
        server app:3001;
    }
    upstream wapow_collector {
        server collector:3002;
    }

    # --- Main site: Vue SPA (apex + www) ---
    # Point DNS A/AAAA for tunedin.live and www to this host. Add TLS (e.g. certbot) on :443 when ready.
    server {
        listen 80 default_server;
        server_name tunedin.live www.tunedin.live;

        root /var/www/wapow-ui;
        index index.html;

        location /assets/ {
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # --- API: FastAPI (wapow-app) ---
    server {
        listen 80;
        server_name api.tunedin.live;

        location / {
            proxy_pass         http://wapow_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # --- Analytics collector ---
    server {
        listen 80;
        server_name collector.tunedin.live;

        location / {
            proxy_pass         http://wapow_collector;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
