services:
  mongo:
    image: mongo:7
    container_name: wapow-mongo
    # No published ports; only other services on the Docker network can reach it
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=wapow-data

  neo4j:
    image: neo4j:5
    container_name: wapow-neo4j
    restart: unless-stopped
    # Internal only in prod; admin access via SSH tunnel
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-wapow-neo4j}
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=512m

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: wapow-clickhouse
    # Do not publish ports externally; expose only inside Docker network
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./migrations:/docker-entrypoint-initdb.d
      - ./config/users.xml:/etc/clickhouse-server/users.d/override-users.xml:ro

  app:
    image: wapow-app
    build: ./wapow-app
    container_name: wapow-api
    environment:
      - PORT=3001
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/wapow-data}
      - NEO4J_URI=${NEO4J_URI:-neo4j://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-wapow-neo4j}
      - AUTH0_DOMAIN=${AUTH0_DOMAIN:-}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE:-}
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_DB=wapow_analytics
    depends_on:
      - mongo
      - neo4j
      - clickhouse

  collector:
    build: ./wapow-collector
    container_name: wapow-collector
    environment:
      - PORT=3002
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_DB=wapow_analytics
    depends_on:
      - clickhouse

  nginx:
    image: nginx:stable
    container_name: wapow-nginx
    depends_on:
      - app
      - collector
    ports:
      - "80:80"
    volumes:
      # Built Vue app should be copied to /var/www/wapow-ui on the host
      - /var/www/wapow-ui:/var/www/wapow-ui:ro
      - ../deploy/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mongo_data:
  neo4j_data:
  clickhouse_data:

